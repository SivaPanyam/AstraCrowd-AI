# =====================================================================
# AstraCrowd AI — single Cloud Run service (nginx + FastAPI)
# =====================================================================

steps:
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/astracrowd:$BUILD_ID'
      - '-t'
      - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/astracrowd:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - '--all-tags'
      - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/astracrowd'
    waitFor: ['build']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - '$_SERVICE_NAME'
      - '--image'
      - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/astracrowd:$BUILD_ID'
      - '--region'
      - '$_LOCATION'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '1Gi'
      - '--cpu'
      - '1'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '10'
      - '--set-env-vars'
      - 'ENVIRONMENT=production,ALLOW_DEMO_AUTH=true'
    waitFor: ['push']

images:
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/astracrowd:$BUILD_ID'
  - '$_LOCATION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/astracrowd:latest'

substitutions:
  _LOCATION: 'us-central1'
  _REPO_NAME: 'astracrowd-registry'
  _SERVICE_NAME: 'astracrowd-ai'

options:
  machineType: 'E2_HIGHCPU_8'
